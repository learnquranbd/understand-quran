server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # /__/firebase/*.js is injected by Firebase Hosting and does not exist
    # locally; serve empty responses so the page loads without parse errors.
    # (firebase.app()/analytics() in index.html is try/catch-wrapped.)
    location /__/ {
        return 204;
    }

    # SPA fallback, mirrors Firebase Hosting's 404 -> index.html redirect
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:pdf|png|jpg|jpeg|gif|ico|webp|ttf|otf|eot|woff|woff2)$ {
        expires 7d;
        add_header Access-Control-Allow-Origin "*";
    }
}
